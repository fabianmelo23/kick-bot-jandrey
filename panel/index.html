<script>
const USER = new URLSearchParams(window.location.search).get("user");

async function cargarUsuario() {

    const res = await fetch(`/user/${USER}`);
    const data = await res.json();

    if (data.error) return;

    document.getElementById("user").innerText = USER;

    document.querySelector(".avatar img").src = data.avatar;

    // 🔥 XP DINÁMICA
    const maxXP = data.nivel * 100;
    const porcentaje = (data.xp / maxXP) * 100;

    document.querySelector(".level").innerHTML = `
        Nivel ${data.nivel}
        <div class="bar">
            <div class="bar-inner" style="width:${porcentaje}%"></div>
        </div>
    `;

    document.querySelector(".stats").innerHTML = `
        <div>❤️ Vida: ${data.vida || 100}</div>
        <div>💪 Fuerza: ${data.fuerza || 5}</div>
        <div>🛡 Defensa: ${data.defensa || 3}</div>
        <div>⚡ Agilidad: ${data.agilidad || 4}</div>
        <div>🏃 Velocidad: ${data.velocidad || 2}</div>
    `;
}

cargarUsuario();
</script>
